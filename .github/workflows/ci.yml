name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Scan current tree for strong secret patterns
        shell: bash
        run: |
          set +e
          git grep -qE 'AKIA[A-Z0-9]{16}|sk-[A-Za-z0-9_-]{20,}|eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+|-----BEGIN [A-Z ]*PRIVATE KEY-----|glpat-[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|sk_live_[A-Za-z0-9]{16,}|gh[pousr]_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}' -- .
          scan_status=$?
          set -e
          case "$scan_status" in
            0)
              echo "Strong secret-shaped value found in the current tree" >&2
              exit 1
              ;;
            1)
              ;;
            *)
              echo "Scanner execution failed" >&2
              exit "$scan_status"
              ;;
          esac

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          version: "0.10.2"

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Test with coverage
        run: >-
          uv run pytest -q
          --cov=github_module_catalog
          --cov-report=term-missing
          --cov-fail-under=80

      - name: Audit dependencies
        run: uv run pip-audit
