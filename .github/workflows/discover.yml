name: Bounded catalog discovery

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: Maximum public-repository pages to fetch
        required: true
        default: 10
        type: number

permissions:
  contents: read

concurrency:
  group: github-module-catalog-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MAX_PAGES: ${{ inputs.max_pages || 10 }}
      WORKSPACE: catalog-workspace
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          version: "0.10.2"

      - name: Install Python
        run: uv python install 3.12

      - name: Install locked dependencies
        run: uv sync --all-groups --locked

      - name: Restore durable discovery checkpoint
        id: restore-state
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: catalog-workspace/data
          key: >-
            ghmod-state-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ghmod-state-${{ runner.os }}-

      - name: Initialize workspace
        run: uv run ghmod init --workspace "$WORKSPACE"

      - name: Run bounded discovery
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run ghmod discover --workspace "$WORKSPACE" --max-pages "$MAX_PAGES"

      - name: Classify current observations
        run: uv run ghmod classify --workspace "$WORKSPACE"

      - name: Build complete catalog publication
        run: uv run ghmod build --workspace "$WORKSPACE"

      - name: Validate publication
        run: uv run ghmod validate --workspace "$WORKSPACE"

      - name: Save durable discovery checkpoint
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: catalog-workspace/data
          key: >-
            ghmod-state-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload catalog and state evidence
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: catalog-discovery-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 3
          path: |
            catalog-workspace/catalog-output
            catalog-workspace/data
